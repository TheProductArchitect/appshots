<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="phone1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="phone2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="phone3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle diagonal lines for texture -->
  <line x1="0" y1="630" x2="630" y2="0" stroke="rgba(255,255,255,0.012)" stroke-width="1"/>
  <line x1="200" y1="630" x2="830" y2="0" stroke="rgba(255,255,255,0.012)" stroke-width="1"/>
  <line x1="400" y1="630" x2="1030" y2="0" stroke="rgba(255,255,255,0.012)" stroke-width="1"/>
  <line x1="600" y1="630" x2="1200" y2="30" stroke="rgba(255,255,255,0.012)" stroke-width="1"/>

  <!-- ── Left: wordmark ──────────────────────────────── -->
  <text
    x="72" y="280"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="112" font-weight="900" letter-spacing="-4"
    fill="#ffffff">appshots.</text>

  <text
    x="74" y="336"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="24" font-weight="400"
    fill="#4b5563">app store screenshots, simplified.</text>

  <rect x="72" y="376" width="56" height="2" rx="1" fill="#ffffff" opacity="0.12"/>

  <!-- Pills -->
  <rect x="72" y="404" width="76" height="28" rx="14" fill="#1a1a1a"/>
  <text x="110" y="423" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600"
    fill="#6b7280">iPhone</text>

  <rect x="158" y="404" width="88" height="28" rx="14" fill="#1a1a1a"/>
  <text x="202" y="423" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600"
    fill="#6b7280">Android</text>

  <rect x="256" y="404" width="68" height="28" rx="14" fill="#1a1a1a"/>
  <text x="290" y="423" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600"
    fill="#6b7280">iPad</text>

  <!-- ── Right: three gradient phones ──────────────── -->

  <!-- Phone 1 — blue, rotated left -->
  <g transform="rotate(-12 775 260)">
    <rect x="715" y="125" width="122" height="264" rx="20" fill="url(#phone1)"/>
    <rect x="748" y="135" width="42" height="11" rx="5.5" fill="rgba(0,0,0,0.3)"/>
    <rect x="731" y="163" width="90" height="9" rx="4.5" fill="rgba(255,255,255,0.4)"/>
    <rect x="731" y="179" width="66" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="725" y="201" width="102" height="142" rx="12" fill="rgba(0,0,0,0.18)"/>
    <rect x="743" y="363" width="58" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- Phone 2 — purple, straight, center -->
  <rect x="876" y="88" width="130" height="280" rx="22" fill="url(#phone2)"/>
  <rect x="876" y="88" width="130" height="280" rx="22" fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <rect x="912" y="99" width="46" height="12" rx="6" fill="rgba(0,0,0,0.3)"/>
  <rect x="892" y="129" width="96" height="10" rx="5" fill="rgba(255,255,255,0.4)"/>
  <rect x="892" y="147" width="70" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="886" y="170" width="108" height="150" rx="14" fill="rgba(0,0,0,0.18)"/>
  <rect x="908" y="350" width="62" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- Phone 3 — pink, rotated right -->
  <g transform="rotate(12 1085 270)">
    <rect x="1040" y="130" width="122" height="264" rx="20" fill="url(#phone3)"/>
    <rect x="1073" y="140" width="42" height="11" rx="5.5" fill="rgba(0,0,0,0.3)"/>
    <rect x="1056" y="168" width="90" height="9" rx="4.5" fill="rgba(255,255,255,0.4)"/>
    <rect x="1056" y="184" width="66" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="1050" y="206" width="102" height="142" rx="12" fill="rgba(0,0,0,0.18)"/>
    <rect x="1068" y="368" width="58" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  </g>
</svg>
