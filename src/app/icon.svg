<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0a0a0a"/>

  <!-- Subtle glow -->
  <ellipse cx="50" cy="52" rx="34" ry="38" fill="rgba(255,255,255,0.04)"/>

  <!-- Phone frame outline -->
  <rect x="29" y="16" width="42" height="70" rx="9" fill="none" stroke="white" stroke-width="3"/>

  <!-- Dynamic Island pill -->
  <rect x="41" y="21" width="18" height="7" rx="3.5" fill="white" opacity="0.9"/>

  <!-- Three thin content lines suggesting a headline + sub -->
  <rect x="37" y="38" width="26" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
  <rect x="40" y="45" width="20" height="2.5" rx="1.25" fill="white" opacity="0.3"/>

  <!-- Home indicator bar -->
  <rect x="42" y="76" width="16" height="2.5" rx="1.25" fill="white" opacity="0.35"/>
</svg>
